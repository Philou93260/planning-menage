<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ménage">

<title>Planning Ménage</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' rx='28' fill='%232d6a4f'/%3E%3Ctext x='64' y='90' font-size='72' text-anchor='middle'%3E🧹%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f4f2;color:#1a1a2e;min-height:100vh;padding-bottom:80px}
.topbar{background:#2d6a4f;color:white;padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-icon{font-size:22px}
.topbar-title{font-size:17px;font-weight:700;flex:1}
.topbar-sub{font-size:11px;opacity:.8}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#4ade80}
.sync-dot.sync{background:#facc15;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;font-size:10px;color:#999;font-weight:500;gap:3px;border:none;background:transparent}
.tab.on{color:#2d6a4f}
.tab-ico{font-size:20px;line-height:1}
.app{max-width:600px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:14px;margin-bottom:10px}
.screen{display:none}
.screen.on{display:block}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.week-nav button{background:#edf7f1;color:#2d6a4f;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.week-nav button.today{background:#2d6a4f;color:white;padding:6px 10px;font-size:11px}
.week-label{flex:1;text-align:center;font-size:13px;font-weight:600}
.prog-bar{height:8px;background:#e8f5e9;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:#2d6a4f;border-radius:4px;transition:width .35s}
.prog-txt{font-size:11px;color:#888;text-align:right;margin-top:4px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.ld{width:8px;height:8px;border-radius:50%}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fb{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid #ddd;cursor:pointer;background:#fff;color:#555;font-weight:500}
.fb.on{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.room-block{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.room-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f0f7f4;cursor:pointer;user-select:none}
.room-ico{font-size:18px;width:26px;text-align:center}
.room-name{font-weight:700;font-size:14px;flex:1}
.room-badge{font-size:11px;padding:2px 9px;border-radius:10px;background:#d4edda;color:#155724;font-weight:700}
.room-badge.full{background:#2d6a4f;color:white}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid #f0f0f0;position:relative}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid #bbb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:white;transition:all .15s}
.chk.on{background:#2d6a4f;border-color:#2d6a4f}
.task-name{flex:1;font-size:14px}
.task-name.struck{text-decoration:line-through;color:#bbb}
/* freq badge */
.ftag{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;font-weight:600;flex-shrink:0;border:1px solid transparent;user-select:none}
.fhebdo{background:#e3f0fb;color:#1a5a9a;border-color:#90c4ef}
.fbimens{background:#edf7f0;color:#1a7a4a;border-color:#80cfa0}
.fmensuel{background:#ede7f6;color:#5c35b5;border-color:#b39ddb}
/* dropdown — fixed position to avoid clipping */
.freq-picker{position:relative;display:inline-flex}
.freq-menu{position:fixed;background:#fff;border:1px solid #ddd;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:500;overflow:hidden;min-width:150px}
.freq-menu.hide{display:none}
.freq-opt{padding:10px 16px;font-size:13px;cursor:pointer;font-weight:500}
.freq-opt:active{background:#f0f7f4}
.freq-opt.sel{color:#2d6a4f;font-weight:700}
.freq-opt+.freq-opt{border-top:1px solid #f0f0f0}
/* bi-mensuel target date */
.bi-target{display:flex;align-items:center;gap:8px;padding:6px 14px 10px 48px;flex-wrap:wrap}
.bi-chk{width:22px;height:22px;border-radius:6px;border:2px solid #80cfa0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:white;transition:all .15s}
.bi-chk.on{background:#1a7a4a;border-color:#1a7a4a}
.bi-label{font-size:12px;color:#555;font-weight:500}
/* mensuel target */
.mens-target{display:flex;align-items:center;gap:8px;padding:6px 14px 10px 48px}
.mens-chk{width:22px;height:22px;border-radius:6px;border:2px solid #b39ddb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:white;transition:all .15s}
.mens-chk.on{background:#5c35b5;border-color:#5c35b5}
.mens-label{font-size:12px;color:#555;font-weight:500}
.mens-done{color:#aaa!important;text-decoration:line-through}
.bi-done{color:#aaa!important;text-decoration:line-through}
/* manage */
.manage-room{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
.manage-room-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#f0f7f4;cursor:pointer;user-select:none}
.manage-room-hdr .room-name{flex:1;font-weight:700;font-size:14px}
.manage-task-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid #f5f5f5}
.manage-task-name{flex:1;font-size:13px}
.del-btn{width:28px;height:28px;border-radius:50%;background:#fff0f0;border:1px solid #ffcccc;color:#cc3333;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-task-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #f0f0f0;background:#fafff9}
.add-task-row input{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.add-task-row input:focus{border-color:#2d6a4f}
.add-task-row button{background:#2d6a4f;color:white;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600}
.add-room-form{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:14px;margin-bottom:10px}
.add-room-form h3{font-size:14px;font-weight:700;margin-bottom:10px;color:#2d6a4f}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.form-row input:focus,.form-row select:focus{border-color:#2d6a4f}
.form-row button{background:#2d6a4f;color:white;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}
/* bilan */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-nav button{background:#edf7f1;color:#2d6a4f;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.month-label{flex:1;text-align:center;font-size:15px;font-weight:700}
.view-tabs{display:flex;gap:6px;margin-bottom:12px}
.vtab{flex:1;text-align:center;padding:7px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid #ddd;background:#fff;color:#666}
.vtab.on{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.recap-week{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.recap-week-hdr{display:flex;align-items:center;padding:10px 14px;background:#f0f7f4;gap:10px;cursor:pointer}
.recap-week-lbl{font-weight:700;font-size:13px;flex:1}
.recap-pct{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px}
.recap-reset{font-size:11px;padding:4px 10px;border-radius:8px;background:#fff;border:1px solid #2d6a4f;color:#2d6a4f;cursor:pointer;font-weight:600;margin-left:4px}
.recap-task-row{display:flex;align-items:center;padding:8px 14px;border-top:1px solid #f5f5f5;gap:10px}
.recap-task-name{flex:1;font-size:13px}
.status-icon{font-size:16px;flex-shrink:0}
.missed-room{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.missed-room-hdr{padding:10px 14px;background:#fff5f5;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.missed-task{padding:8px 14px;border-top:1px solid #f5f5f5;font-size:13px;display:flex;gap:8px;align-items:center}
.missed-week-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#ffe0e0;color:#cc3333;font-weight:600;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-head{text-align:center;font-size:10px;font-weight:700;color:#666;padding:4px 0}
.cal-day{border-radius:8px;padding:4px 2px;text-align:center;min-height:40px}
.cal-day .day-num{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-day.empty{opacity:0}
.cal-day.ok{background:#e8f5e9}
.cal-day.miss{background:#fff0f0}
.cal-day.partial{background:#fff8e1}
.cal-day.future{background:#f5f5f5;color:#bbb}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto}
.empty-state{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.loading{text-align:center;padding:2rem;color:#888;font-size:14px}
footer{text-align:center;font-size:11px;color:#bbb;padding:1rem 0 2rem}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-icon">🧹</span>
  <div style="flex:1">
    <div class="topbar-title">Planning Ménage</div>
    <div class="topbar-sub" id="topweek"></div>
  </div>
  <div class="sync-dot" id="syncdot" title="Synchronisation"></div>
</div>

<div class="app">

  <!-- PLANNING -->
  <div class="screen on" id="screen-planning">
    <div class="card">
      <div class="week-nav">
        <button onclick="cw(-1)">◀</button>
        <span class="week-label" id="wl"></span>
        <button onclick="cw(1)">▶</button>
        <button class="today" onclick="cw(0,1)">Auj.</button>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <div class="prog-txt" id="pt">–</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#90c4ef"></div>Hebdo</div>
        <div class="li"><div class="ld" style="background:#80cfa0"></div>Bi-mensuel</div>
        <div class="li"><div class="ld" style="background:#b39ddb"></div>Mensuel</div>
      </div>
    </div>
    <div class="filters" id="room-filters"></div>
    <div id="rooms"></div>
  </div>

  <!-- BILAN -->
  <div class="screen" id="screen-bilan">
    <div class="card">
      <div class="month-nav">
        <button onclick="cm(-1)">◀</button>
        <span class="month-label" id="mlabel"></span>
        <button onclick="cm(1)">▶</button>
      </div>
      <div class="view-tabs">
        <button class="vtab on" id="vt-recap" onclick="setView('recap')">📋 Récap</button>
        <button class="vtab" id="vt-missed" onclick="setView('missed')">❌ Non faites</button>
        <button class="vtab" id="vt-cal" onclick="setView('cal')">📅 Calendrier</button>
      </div>
    </div>
    <div id="bilan-content"></div>
  </div>

  <!-- GÉRER -->
  <div class="screen" id="screen-manage">
    <div class="add-room-form">
      <h3>➕ Ajouter une tâche</h3>
      <div class="form-row">
        <input id="new-task-name" placeholder="Nom de la tâche" />
        <select id="new-task-room"><option value="">Pièce...</option></select>
      </div>
      <div class="form-row">
        <select id="new-task-freq">
          <option value="hebdo">Hebdomadaire</option>
          <option value="bimens">Bi-mensuel</option>
          <option value="mensuel">Mensuel</option>
        </select>
        <button onclick="addTask()">Ajouter</button>
      </div>
    </div>
    <div id="manage-rooms"></div>
  </div>
</div>

<div class="tabbar">
  <button class="tab on" id="tab-planning" onclick="showScreen('planning')">
    <span class="tab-ico">📋</span>Planning
  </button>
  <button class="tab" id="tab-bilan" onclick="showScreen('bilan')">
    <span class="tab-ico">📊</span>Bilan
  </button>
  <button class="tab" id="tab-manage" onclick="showScreen('manage')">
    <span class="tab-ico">⚙️</span>Gérer
  </button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvQoS-_I0LSDYkW_dVIt8Hqmfqj-_SvGU",
  authDomain: "planning-menage-c832d.firebaseapp.com",
  projectId: "planning-menage-c832d",
  storageBucket: "planning-menage-c832d.firebasestorage.app",
  messagingSenderId: "1089776086126",
  appId: "1:1089776086126:web:7318486e939eea4dbf8a7f"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Constants ──────────────────────────────────────────────────────
const DEFAULT_ROOMS=['SdB','WC','Douche','Jules','Desk','Couloir','Chambre','Salon','Cuisine','Entrée'];
const ICONS={SdB:'🚿',WC:'🚽',Douche:'🛁',Jules:'🛏',Desk:'💻',Couloir:'🚪',Chambre:'🛌',Salon:'🛋',Cuisine:'🍳',Entrée:'🚪'};
const FREQS=['hebdo','bimens','mensuel'];
const FLABELS={hebdo:'Hebdo',bimens:'Bi-mensuel',mensuel:'Mensuel'};
const FCLASS={hebdo:'fhebdo',bimens:'fbimens',mensuel:'fmensuel'};
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR=['L','M','M','J','V','S','D'];

const DEFAULT_TASKS=[
  {id:'glace',   name:'Glace',            rooms:['SdB','Douche','Couloir'],freq:'hebdo'},
  {id:'aeration',name:'Aération',         rooms:['SdB','WC','Douche','Cuisine'],freq:'hebdo'},
  {id:'draps',   name:'Draps',            rooms:['Jules','Chambre'],freq:'hebdo'},
  {id:'meuble',  name:'Meuble',           rooms:['Salon','Cuisine'],freq:'hebdo'},
  {id:'nuit',    name:'Table de nuit',    rooms:['Chambre'],freq:'hebdo'},
  {id:'canape',  name:'Canapé',           rooms:['Desk'],freq:'hebdo'},
  {id:'tv',      name:'TV',               rooms:['Salon'],freq:'hebdo'},
  {id:'pouss',   name:'Poussière',        rooms:['Salon','Chambre','Jules','Desk'],freq:'hebdo'},
  {id:'wcnet',   name:'Nettoyage WC',     rooms:['WC'],freq:'hebdo'},
  {id:'douchet', name:'Nettoyage douche', rooms:['Douche'],freq:'hebdo'},
  {id:'sol',     name:'Sol',              rooms:['SdB','WC','Douche','Jules','Couloir','Chambre','Salon','Cuisine'],freq:'mensuel'},
  {id:'fenetre', name:'Fenêtre',          rooms:['Jules','Desk','Chambre','Salon','Cuisine'],freq:'mensuel'},
  {id:'mbhaut',  name:'Meuble haut',      rooms:['WC','Desk'],freq:'mensuel'},
  {id:'derlit',  name:'Derrière le lit',  rooms:['Jules','Chambre'],freq:'mensuel'},
  {id:'four',    name:'Four',             rooms:['Cuisine'],freq:'mensuel'},
  {id:'verr',    name:'Verrière',         rooms:['Salon'],freq:'mensuel'},
  {id:'entree_porte',  name:'Portes',    rooms:['Entrée'],freq:'hebdo'},
  {id:'entree_miroir', name:'Miroirs',   rooms:['Entrée'],freq:'hebdo'},
  {id:'entree_chaussures', name:'Chaussures', rooms:['Entrée'],freq:'hebdo'},
];

// ── State ──────────────────────────────────────────────────────────
let offset=0, filter='all', openMenu=null, openMenuTid=null, openMenuRoom=null;
let monthOffset=0, bilanView='recap';
let currentScreen='planning';
// Firestore data
let checks={};      // {checkKey: true}
let freqOv={};      // {taskId: freq}
let customTasks=[]; // [{id,name,rooms,freq}]
let deletedIds=[];  // [id or 'del_room_tid_room']
let roomOrder=[...DEFAULT_ROOMS];
let dbLoaded=false;

// ── Firestore helpers ──────────────────────────────────────────────
function setSyncDot(state){ // 'sync','ok','err'
  const d=document.getElementById('syncdot');
  d.className='sync-dot'+(state==='ok'?' ok':state==='sync'?' sync':'');
}

async function saveToFirestore(data){
  setSyncDot('sync');
  try{
    await setDoc(doc(db,'planning','shared'),data,{merge:true});
    setSyncDot('ok');
  }catch(e){setSyncDot('err');console.error(e);}
}

// Listen to real-time changes from Firestore
onSnapshot(doc(db,'planning','shared'), snap=>{
  if(snap.exists()){
    const d=snap.data();
    checks=d.checks||{};
    freqOv=d.freq||{};
    customTasks=d.custom||[];
    deletedIds=d.deleted||[];
    roomOrder=d.rooms||[...DEFAULT_ROOMS];
  }
  dbLoaded=true;
  setSyncDot('ok');
  renderAll();
});

async function save(){
  await saveToFirestore({checks,freq:freqOv,custom:customTasks,deleted:deletedIds,rooms:roomOrder});
}

// ── Task helpers ───────────────────────────────────────────────────
function getAllTasks(){
  const base=DEFAULT_TASKS
    .filter(t=>!deletedIds.includes(t.id))
    .map(t=>({...t,freq:freqOv[t.id]||t.freq}));
  return [...base,...customTasks.map(t=>({...t,freq:freqOv[t.id]||t.freq}))];
}
function getAllRooms(){
  const custom=customTasks.flatMap(t=>t.rooms).filter(r=>!roomOrder.includes(r));
  return [...roomOrder,...new Set(custom)];
}
function getTasksForRoom(room){
  return getAllTasks().filter(t=>t.rooms.includes(room)&&!deletedIds.includes('del_room_'+t.id+'_'+room));
}

// ── Week utils ─────────────────────────────────────────────────────
function wkKey(o){
  const n=new Date(),dw=n.getDay()||7,m=new Date(n);
  m.setDate(n.getDate()-dw+1+o*7);
  return m.toISOString().slice(0,10);
}
function wkLabel(o){
  const k=wkKey(o),m=new Date(k),s=new Date(m);
  s.setDate(m.getDate()+6);
  const f=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  if(o===0)return`Cette semaine · ${f(m)} – ${f(s)}`;
  if(o===-1)return`Sem. dernière · ${f(m)} – ${f(s)}`;
  return`${f(m)} – ${f(s)}`;
}

function addDays(dateStr,n){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+n);
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}
function nextMonthDate(wk,tid,room){
  // Utilise la date de coche réelle si disponible, sinon la date de la semaine
  const k=ck(wk,tid,room,null);
  const c=checks[k];
  const base=(c&&c.at)?new Date(c.at+'T12:00:00'):new Date(wk+'T12:00:00');
  base.setDate(base.getDate()+21);
  return base.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}
function in14Days(wk,tid,room,slot){
  const k=ck(wk,tid,room,slot);
  const c=checks[k];
  const base=(c&&c.at)?new Date(c.at+'T12:00:00'):new Date(wk+'T12:00:00');
  base.setDate(base.getDate()+14);
  return base.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}

// ── Check keys ─────────────────────────────────────────────────────
// hebdo:   wk|tid|room
// bimens:  month_YYYY-MM|tid|room|A or B  (1st or 2nd fortnight)
// mensuel: month_YYYY-MM|tid|room

function getCurrentMonth(){
  const n=new Date();
  return n.toISOString().slice(0,7); // YYYY-MM
}
function getMonthKey(wk){
  return 'month_'+wk.slice(0,7);
}
function ck(wk,tid,room,slot){
  const tasks=getAllTasks();
  const t=tasks.find(x=>x.id===tid);
  const freq=t?t.freq:'hebdo';
  if(freq==='bimens'){
    const mk=getMonthKey(wk);
    return slot?`${mk}|${tid}|${room}|${slot}`:`${mk}|${tid}|${room}|A`;
  }
  if(freq==='mensuel'){
    return `${getMonthKey(wk)}|${tid}|${room}`;
  }
  return `${wk}|${tid}|${room}`;
}
function isOn(wk,tid,room,slot){
  const k=ck(wk,tid,room,slot);
  const c=checks[k];
  if(!c) return false;
  // Support ancien format (true) et nouveau ({at:'...'})
  if(c===true) return true;
  if(!c.at) return true;
  const freq=getAllTasks().find(t=>t.id===tid)?.freq||'hebdo';
  const days=freq==='mensuel'?21:freq==='bimens'?14:0;
  if(days===0) return true; // hebdo: toujours visible
  const checkedAt=new Date(c.at+'T12:00:00');
  const unlockDate=new Date(checkedAt);
  unlockDate.setDate(checkedAt.getDate()+days);
  return new Date()<unlockDate; // true = encore dans le délai (coché), false = délai dépassé
}

async function toggle(wk,tid,room,slot){
  const k=ck(wk,tid,room,slot);
  if(checks[k]) delete checks[k];
  else checks[k]={at: new Date().toISOString().slice(0,10)};
  await save();
}

// ── Navigation ─────────────────────────────────────────────────────
function cw(d,reset){offset=reset?0:offset+d;closeMenu();renderPlanning();}
function cm(d){monthOffset+=d;renderBilan();}
function sf(f){
  filter=f;
  document.querySelectorAll('#room-filters .fb').forEach(b=>b.classList.toggle('on',b.dataset.filter===f));
  closeMenu();renderPlanning();
}

function renderFilters(){
  let h=`<button class="fb${filter==='all'?' on':''}" data-filter="all" onclick="sf('all')">Toutes</button>
    <button class="fb${filter==='todo'?' on':''}" data-filter="todo" onclick="sf('todo')">À faire</button>`;
  getAllRooms().forEach(r=>{
    h+=`<button class="fb${filter===r?' on':''}" data-filter="${r}" onclick="sf('${r}')">${r}</button>`;
  });
  document.getElementById('room-filters').innerHTML=h;
}
function showScreen(s){
  currentScreen=s;
  ['planning','manage','bilan'].forEach(id=>{
    document.getElementById('screen-'+id).classList.toggle('on',id===s);
    document.getElementById('tab-'+id).classList.toggle('on',id===s);
  });
  if(s==='manage')renderManage();
  if(s==='bilan')renderBilan();
  if(s==='planning')renderPlanning();
}
function setView(v){
  bilanView=v;
  ['recap','missed','cal'].forEach(id=>document.getElementById('vt-'+id).classList.toggle('on',id===v));
  renderBilan();
}

// ── Dropdown menu (fixed position to avoid clipping) ──────────────
function closeMenu(){
  if(openMenu){openMenu.classList.add('hide');openMenu=null;openMenuTid=null;openMenuRoom=null;}
}
function toggleFreqMenu(tid,room,badgeEl){
  const menu=document.getElementById(`fm-${tid}-${room}`);
  if(!menu)return;
  if(openMenu&&openMenu!==menu){openMenu.classList.add('hide');}
  if(!menu.classList.contains('hide')){closeMenu();return;}
  // Position the menu above or below the badge
  const rect=badgeEl.getBoundingClientRect();
  const spaceBelow=window.innerHeight-rect.bottom;
  const menuH=130;
  if(spaceBelow<menuH+10){
    menu.style.top=(rect.top-menuH-6)+'px';
  }else{
    menu.style.top=(rect.bottom+6)+'px';
  }
  menu.style.left=Math.max(8,rect.right-150)+'px';
  menu.classList.remove('hide');
  openMenu=menu;openMenuTid=tid;openMenuRoom=room;
}
async function setFreq(tid,freq){
  freqOv[tid]=freq;
  await save();
  closeMenu();
}

// ── Add/delete tasks ───────────────────────────────────────────────
async function addTask(){
  const name=document.getElementById('new-task-name').value.trim();
  const room=document.getElementById('new-task-room').value;
  const freq=document.getElementById('new-task-freq').value;
  if(!name||!room){alert('Remplis le nom et la pièce !');return;}
  const existing=customTasks.find(t=>t.name.toLowerCase()===name.toLowerCase());
  if(existing){if(!existing.rooms.includes(room))existing.rooms.push(room);}
  else{customTasks.push({id:'ct_'+Date.now(),name,rooms:[room],freq});}
  document.getElementById('new-task-name').value='';
  await save();renderManage();renderPlanning();
}
async function deleteTaskFromRoom(tid,room){
  const def=DEFAULT_TASKS.find(t=>t.id===tid);
  if(def){
    if(def.rooms.length===1){if(!deletedIds.includes(tid))deletedIds.push(tid);}
    else{const k='del_room_'+tid+'_'+room;if(!deletedIds.includes(k))deletedIds.push(k);}
  }
  const ci=customTasks.findIndex(t=>t.id===tid);
  if(ci>=0){
    customTasks[ci].rooms=customTasks[ci].rooms.filter(r=>r!==room);
    if(customTasks[ci].rooms.length===0)customTasks.splice(ci,1);
  }
  await save();renderManage();renderPlanning();
}
async function quickAdd(room){
  const inp=document.getElementById('it-'+room);
  const name=inp.value.trim();if(!name)return;
  const freq=document.getElementById('new-task-freq').value||'hebdo';
  const existing=customTasks.find(t=>t.name.toLowerCase()===name.toLowerCase());
  if(existing){if(!existing.rooms.includes(room))existing.rooms.push(room);}
  else{customTasks.push({id:'ct_'+Date.now(),name,rooms:[room],freq});}
  inp.value='';
  await save();renderManage();renderPlanning();
}

// ── Expose globals ─────────────────────────────────────────────────
window.cw=cw;window.cm=cm;window.sf=sf;window.showScreen=showScreen;window.setView=setView;
window.toggleFreqMenu=toggleFreqMenu;window.setFreq=setFreq;
window.addTask=addTask;window.deleteTaskFromRoom=deleteTaskFromRoom;window.quickAdd=quickAdd;
window.tog=function(id){const el=document.getElementById(id);if(el)el.classList.toggle('hide');};
window.doToggle=async function(wk,tid,room,slot){await toggle(wk,tid,room,slot);};
window.markWeekDone=async function(wk){
  const tasks=getAllTasks();
  getAllRooms().forEach(room=>{
    getTasksForRoom(room).forEach(t=>{
      if(t.freq==='bimens'){
        checks[ck(wk,t.id,room,'A')]=true;
        checks[ck(wk,t.id,room,'B')]=true;
      }else{
        checks[ck(wk,t.id,room)]=true;
      }
    });
  });
  await save();
};
window.resetWeek=async function(wk){
  // Remove all keys for this week
  const tasks=getAllTasks();
  getAllRooms().forEach(room=>{
    getTasksForRoom(room).forEach(t=>{
      if(t.freq==='bimens'){
        delete checks[ck(wk,t.id,room,'A')];
        delete checks[ck(wk,t.id,room,'B')];
      }else{
        delete checks[ck(wk,t.id,room)];
      }
    });
  });
  await save();
};

// ── RENDER PLANNING ────────────────────────────────────────────────
function renderPlanning(){
  if(!dbLoaded){document.getElementById('rooms').innerHTML='<div class="loading">⏳ Chargement…</div>';return;}
  const wk=wkKey(offset);
  const lbl=wkLabel(offset);
  document.getElementById('wl').textContent=lbl;
  document.getElementById('topweek').textContent=lbl;
  renderFilters();

  let tot=0,done=0;
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(t=>{
    if(t.freq==='bimens'){
      ['A','B'].forEach(s=>{tot++;if(isOn(wk,t.id,room,s))done++;});
    }else{tot++;if(isOn(wk,t.id,room))done++;}
  }));
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${done} / ${tot} tâches · ${pct}%`;

  let html='';
  const roomsToShow = (filter==='all'||filter==='todo') ? getAllRooms() : getAllRooms().filter(r=>r===filter);
  roomsToShow.forEach(room=>{
    let tasks=getTasksForRoom(room);
    let filtered=tasks.filter(t=>{
      if(filter==='todo'){
        if(t.freq==='bimens')return['A','B'].some(s=>!isOn(wk,t.id,room,s));
        return!isOn(wk,t.id,room);
      }
      return true;
    });
    if(!filtered.length)return;

    let rd=0,rt=0;
    tasks.forEach(t=>{
      if(t.freq==='bimens'){['A','B'].forEach(s=>{rt++;if(isOn(wk,t.id,room,s))rd++;});}
      else{rt++;if(isOn(wk,t.id,room))rd++;}
    });
    const full=rd===rt&&rt>0;

    html+=`<div class="room-block">
      <div class="room-hdr" onclick="tog('rb-${room}')">
        <span class="room-ico">${ICONS[room]||'🏠'}</span>
        <span class="room-name">${room}</span>
        <span class="room-badge${full?' full':''}">${rd}/${rt}</span>
      </div>
      <div id="rb-${room}">`;

    filtered.forEach(t=>{
      const isBi=t.freq==='bimens';
      const isMens=t.freq==='mensuel';
      const chk=(!isBi)&&isOn(wk,t.id,room);

      // For mensuel: get current month label
      const now=new Date();
      const monthLabel=MONTHS_FR[now.getMonth()]+' '+now.getFullYear();
      const biMonth=getMonthKey(wk).replace('month_','');
      const [by,bm]=biMonth.split('-');
      const biLabel=MONTHS_FR[parseInt(bm)-1]+' '+by;

      html+=`<div class="task-row">
        ${(isBi||isMens)?'<div style="width:24px;flex-shrink:0"></div>':`<div class="chk${chk?' on':''}" onclick="doToggle('${wk}','${t.id}','${room}')">${chk?'✓':''}</div>`}
        <span class="task-name${chk?' struck':''}">${t.name}</span>
        <div class="freq-picker" style="position:static">
          <span class="ftag ${FCLASS[t.freq]}" id="badge-${t.id}-${room}" onclick="toggleFreqMenu('${t.id}','${room}',this)">${FLABELS[t.freq]} ▾</span>
          <div class="freq-menu hide" id="fm-${t.id}-${room}">
            ${FREQS.map(f=>`<div class="freq-opt${t.freq===f?' sel':''}" onclick="setFreq('${t.id}','${f}')">${FLABELS[f]}</div>`).join('')}
          </div>
        </div>
      </div>`;

      // Bi-mensuel: two checkboxes for current month (1st and 2nd fortnight)
      if(isBi){
        const onA=isOn(wk,t.id,room,'A');
        const onB=isOn(wk,t.id,room,'B');
        const next14A=in14Days(wk,t.id,room,'A'); const next14B=in14Days(wk,t.id,room,'B');
        html+=`<div class="bi-target">
          <div class="bi-chk${onA?' on':''}" onclick="doToggle('${wk}','${t.id}','${room}','A')">${onA?'✓':''}</div>
          ${onA
            ? `<span class="bi-label bi-done">1ère quinzaine · ${biLabel}</span><span style="color:#2d6a4f;font-size:10px;margin-left:4px">· Prochaine fois le ${next14A}</span>`
            : `<span class="bi-label">1ère quinzaine · ${biLabel}</span>`
          }
          <div style="width:12px"></div>
          <div class="bi-chk${onB?' on':''}" onclick="doToggle('${wk}','${t.id}','${room}','B')">${onB?'✓':''}</div>
          ${onB
            ? `<span class="bi-label bi-done">2e quinzaine</span><span style="color:#2d6a4f;font-size:10px;margin-left:4px">· Prochaine fois le ${next14B}</span>`
            : `<span class="bi-label">2e quinzaine</span>`
          }
        </div>`;
      }
      // Mensuel: one checkbox for current month
      if(isMens){
        const onM=isOn(wk,t.id,room);
        const wkDate=new Date(wk+'T12:00:00');
        const realMonthLabel=MONTHS_FR[wkDate.getMonth()]+' '+wkDate.getFullYear();
        const nextDate=nextMonthDate(wk,t.id,room);
        html+=`<div class="mens-target">
          <div class="mens-chk${onM?' on':''}" onclick="doToggle('${wk}','${t.id}','${room}')">${onM?'✓':''}</div>
          ${onM
            ? `<span class="mens-label mens-done">Fait en ${realMonthLabel}</span><span style="color:#2d6a4f;font-size:10px;margin-left:6px">· Prochaine fois le ${nextDate}</span>`
            : `<span class="mens-label">À faire en ${realMonthLabel}</span>`
          }
        </div>`;
      }
    });
    html+=`</div></div>`;
  });

  document.getElementById('rooms').innerHTML=html||'<div class="empty-state">Aucune tâche.</div>';
}

// ── RENDER MANAGE ──────────────────────────────────────────────────
function renderManage(){
  const sel=document.getElementById('new-task-room');
  sel.innerHTML='<option value="">Pièce...</option>';
  getAllRooms().forEach(r=>sel.innerHTML+=`<option value="${r}">${r}</option>`);
  sel.innerHTML+=`<option value="__new">+ Nouvelle pièce...</option>`;

  let html='';
  getAllRooms().forEach(room=>{
    const tasks=getTasksForRoom(room);
    if(!tasks.length)return;
    html+=`<div class="manage-room">
      <div class="manage-room-hdr" onclick="tog('mr-${room}')">
        <span>${ICONS[room]||'🏠'}</span>
        <span class="room-name">${room}</span>
        <span style="font-size:12px;color:#888">${tasks.length} tâche${tasks.length>1?'s':''}</span>
      </div>
      <div id="mr-${room}">`;
    tasks.forEach(t=>{
      html+=`<div class="manage-task-row">
        <span class="manage-task-name">${t.name}</span>
        <span class="ftag ${FCLASS[t.freq]}" style="cursor:default">${FLABELS[t.freq]}</span>
        <button class="del-btn" onclick="deleteTaskFromRoom('${t.id}','${room}')">×</button>
      </div>`;
    });
    html+=`<div class="add-task-row">
      <input placeholder="Nouvelle tâche..." id="it-${room}" onkeydown="if(event.key==='Enter')quickAdd('${room}')">
      <button onclick="quickAdd('${room}')">＋</button>
    </div></div></div>`;
  });
  document.getElementById('manage-rooms').innerHTML=html||'<div class="empty-state">Aucune pièce.</div>';
}

// ── RENDER BILAN ───────────────────────────────────────────────────
function getMonthWeeks(mo){
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth()+mo,1);
  const ty=target.getFullYear(),tm=target.getMonth();
  const firstDay=new Date(ty,tm,1),lastDay=new Date(ty,tm+1,0);
  let mon=new Date(firstDay);
  const dw=mon.getDay()||7;mon.setDate(mon.getDate()-dw+1);
  const weeks=[];
  while(mon<=lastDay){
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const f=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    weeks.push({key:mon.toISOString().slice(0,10),label:`${f(mon)} – ${f(sun)}`,mon:new Date(mon),sun:new Date(sun)});
    mon.setDate(mon.getDate()+7);
  }
  return{weeks,ty,tm};
}

function renderBilan(){
  if(!dbLoaded){document.getElementById('bilan-content').innerHTML='<div class="loading">⏳ Chargement…</div>';return;}
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
  document.getElementById('mlabel').textContent=`${MONTHS_FR[target.getMonth()]} ${target.getFullYear()}`;
  const{weeks,ty,tm}=getMonthWeeks(monthOffset);
  if(bilanView==='recap')renderRecap(weeks,ty,tm);
  else if(bilanView==='missed')renderMissed(weeks,ty,tm);
  else renderCal(weeks,ty,tm);
}

function taskDone(wk,t,room){
  if(t.freq==='bimens')return['A','B'].every(s=>isOn(wk,t.id,room,s));
  return isOn(wk,t.id,room);
}

function renderRecap(weeks,ty,tm){
  const today=new Date();
  // Most recent first
  const sorted=[...weeks].reverse();
  let html='';
  sorted.forEach(w=>{
    const isFuture=w.mon>today;
    let wDone=0,wTot=0;
    const rows=[];
    getAllRooms().forEach(room=>{
      getTasksForRoom(room).forEach(t=>{
        if(t.freq==='bimens'){
          ['A','B'].forEach(s=>{wTot++;if(isOn(w.key,t.id,room,s))wDone++;});
          const dA=isOn(w.key,t.id,room,'A'),dB=isOn(w.key,t.id,room,'B');
          rows.push({name:`${t.name} · ${room} (1ère)`,done:dA,future:isFuture});
          rows.push({name:`${t.name} · ${room} (2e)`,done:dB,future:isFuture});
        }else{
          wTot++;const d=taskDone(w.key,t,room);if(d)wDone++;
          rows.push({name:`${t.name} · ${room}`,done:d,future:isFuture});
        }
      });
    });
    const pct=wTot?Math.round(wDone/wTot*100):0;
    const pctCol=pct>=80?'#2d6a4f':pct>=40?'#e6a817':'#cc3333';
    html+=`<div class="recap-week">
      <div class="recap-week-hdr" onclick="tog('rw-${w.key}')">
        <span class="recap-week-lbl">${w.label}</span>
        ${!isFuture?`<span class="recap-pct" style="background:${pctCol}22;color:${pctCol}">${pct}%</span>
        <button class="recap-reset" onclick="event.stopPropagation();markWeekDone('${w.key}')">✅ Tout fait</button>
        <button class="recap-reset" style="color:#cc3333;border-color:#cc3333" onclick="event.stopPropagation();resetWeek('${w.key}')">↺</button>`
        :'<span style="font-size:12px;color:#aaa">À venir</span>'}
      </div>`;
    if(!isFuture){
      html+=`<div id="rw-${w.key}" class="hide">`;
      rows.forEach(r=>{
        const ico=r.future?'⏳':r.done?'✅':'❌';
        html+=`<div class="recap-task-row"><span class="status-icon">${ico}</span><span class="recap-task-name">${r.name}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('bilan-content').innerHTML=html||'<div class="empty-state">Aucune donnée.</div>';
}

function renderMissed(weeks,ty,tm){
  const today=new Date();
  const missedByRoom={};
  getAllRooms().forEach(room=>{
    getTasksForRoom(room).forEach(t=>{
      weeks.forEach(w=>{
        if(w.sun>=today)return;
        if(!taskDone(w.key,t,room)){
          if(!missedByRoom[room])missedByRoom[room]=[];
          missedByRoom[room].push({task:t.name,week:w.label});
        }
      });
    });
  });
  let html='';
  Object.keys(missedByRoom).forEach(room=>{
    const items=missedByRoom[room];
    if(!items.length)return;
    html+=`<div class="missed-room">
      <div class="missed-room-hdr">${ICONS[room]||'🏠'} ${room} <span style="color:#cc3333;font-size:12px">(${items.length} manquée${items.length>1?'s':''})</span></div>`;
    items.forEach(m=>{
      html+=`<div class="missed-task"><span style="flex:1">${m.task}</span><span class="missed-week-tag">${m.week}</span></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('bilan-content').innerHTML=html||'<div class="empty-state">🎉 Aucune tâche manquée ce mois !</div>';
}

function renderCal(weeks,ty,tm){
  const today=new Date();
  const dayStatus={};
  getAllRooms().forEach(room=>{
    getTasksForRoom(room).forEach(t=>{
      weeks.forEach(w=>{
        const d=w.key;
        if(!dayStatus[d])dayStatus[d]={done:0,tot:0};
        if(t.freq==='bimens'){
          dayStatus[d].tot+=2;
          dayStatus[d].done+=(['A','B'].filter(s=>isOn(w.key,t.id,room,s)).length);
        }else{
          dayStatus[d].tot++;
          if(taskDone(w.key,t,room))dayStatus[d].done++;
        }
      });
    });
  });
  const firstDay=new Date(ty,tm,1),daysInMonth=new Date(ty,tm+1,0).getDate();
  const startDow=(firstDay.getDay()||7)-1;
  let html=`<div class="card"><div class="cal-grid">`;
  DAYS_FR.forEach(d=>html+=`<div class="cal-head">${d}</div>`);
  for(let i=0;i<startDow;i++)html+=`<div class="cal-day empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(ty,tm,day);
    const dw=date.getDay()||7;
    const mon=new Date(date);mon.setDate(date.getDate()-dw+1);
    const wk=mon.toISOString().slice(0,10);
    const s=dayStatus[wk]||{done:0,tot:0};
    const isFuture=date>today;
    const pct=s.tot?s.done/s.tot:0;
    let cls=isFuture?'cal-day future':s.tot===0?'cal-day future':pct>=1?'cal-day ok':pct>0?'cal-day partial':'cal-day miss';
    const dotCol=pct>=1?'#2d6a4f':pct>0?'#e6a817':'#cc3333';
    html+=`<div class="${cls}"><div class="day-num">${day}</div>${!isFuture&&s.tot>0?`<div class="cal-dot" style="background:${dotCol}"></div>`:''}</div>`;
  }
  html+=`</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
    <div class="li"><div class="ld" style="background:#2d6a4f"></div><span style="font-size:11px">Toutes faites</span></div>
    <div class="li"><div class="ld" style="background:#e6a817"></div><span style="font-size:11px">Partielles</span></div>
    <div class="li"><div class="ld" style="background:#cc3333"></div><span style="font-size:11px">Non faites</span></div>
  </div></div>`;
  document.getElementById('bilan-content').innerHTML=html;
}

function renderAll(){
  if(currentScreen==='planning')renderPlanning();
  else if(currentScreen==='bilan')renderBilan();
  else if(currentScreen==='manage')renderManage();
}

// ── Room select new room ───────────────────────────────────────────
document.addEventListener('change',async e=>{
  if(e.target.id==='new-task-room'&&e.target.value==='__new'){
    const name=prompt('Nom de la nouvelle pièce :');
    if(name&&name.trim()){
      const r=name.trim();
      if(!roomOrder.includes(r))roomOrder.push(r);
      await save();renderManage();
      e.target.innerHTML='<option value="">Pièce...</option>';
      getAllRooms().forEach(rr=>e.target.innerHTML+=`<option value="${rr}">${rr}</option>`);
      e.target.innerHTML+=`<option value="__new">+ Nouvelle pièce...</option>`;
      e.target.value=r;
    }else{e.target.value='';}
  }
});

// Close menu on outside click
document.addEventListener('click',e=>{
  if(openMenu&&!e.target.closest('.freq-picker')&&!e.target.classList.contains('ftag')){closeMenu();}
});

// Initial render (before Firestore loads)
renderPlanning();
