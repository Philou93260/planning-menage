<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f4f2;color:#1a1a2e;min-height:100vh;padding-bottom:80px}
.topbar{background:#2d6a4f;color:white;padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-icon{font-size:22px}.topbar-title{font-size:17px;font-weight:700;flex:1}.topbar-sub{font-size:11px;opacity:.8}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#aaa;flex-shrink:0}
.sync-dot.ok{background:#4ade80}.sync-dot.sync{background:#facc15;animation:pulse .8s infinite}.sync-dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;font-size:10px;color:#999;font-weight:500;gap:3px;border:none;background:transparent}
.tab.on{color:#2d6a4f}.tab-ico{font-size:20px;line-height:1}
.app{max-width:600px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:14px;margin-bottom:10px}
.screen{display:none}.screen.on{display:block}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.week-nav button{background:#edf7f1;color:#2d6a4f;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.week-nav button.today{background:#2d6a4f;color:white;padding:6px 10px;font-size:11px}
.week-label{flex:1;text-align:center;font-size:13px;font-weight:600}
.prog-bar{height:8px;background:#e8f5e9;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:#2d6a4f;border-radius:4px;transition:width .35s}
.prog-txt{font-size:11px;color:#888;text-align:right;margin-top:4px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.ld{width:8px;height:8px;border-radius:50%}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fb{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid #ddd;cursor:pointer;background:#fff;color:#555;font-weight:500}
.fb.on{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.room-block{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.room-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f0f7f4;cursor:pointer;user-select:none}
.room-ico{font-size:18px;width:26px;text-align:center}.room-name{font-weight:700;font-size:14px;flex:1}
.room-badge{font-size:11px;padding:2px 9px;border-radius:10px;background:#d4edda;color:#155724;font-weight:700}
.room-badge.full{background:#2d6a4f;color:white}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid #f0f0f0}
.task-row.locked-row{background:#fafafa}
.chk{width:26px;height:26px;border-radius:7px;border:2px solid #bbb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:white;transition:all .15s}
.chk.on{background:#2d6a4f;border-color:#2d6a4f}.chk.locked{background:#e0e0e0;border-color:#ccc;cursor:default}
.task-name{flex:1;font-size:14px}.task-name.struck{text-decoration:line-through;color:#bbb}.task-name.lkn{color:#aaa}
.locked-info{display:flex;align-items:center;gap:8px;padding:2px 14px 10px 50px}
.locked-date{font-size:11px;color:#aaa;flex:1}
.redo-btn{background:#edf7f1;border:1.5px solid #2d6a4f;border-radius:10px;cursor:pointer;font-size:15px;padding:5px 10px;color:#2d6a4f;font-weight:700;min-width:40px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ftag{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;font-weight:600;flex-shrink:0;border:1px solid transparent}
.fhebdo{background:#e3f0fb;color:#1a5a9a;border-color:#90c4ef}
.fbimens{background:#edf7f0;color:#1a7a4a;border-color:#80cfa0}
.fmensuel{background:#ede7f6;color:#5c35b5;border-color:#b39ddb}
.freq-menu{position:fixed;background:#fff;border:1px solid #ddd;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:500;overflow:hidden;min-width:150px}
.freq-menu.hide{display:none}
.freq-opt{padding:10px 16px;font-size:13px;cursor:pointer;font-weight:500}
.freq-opt:active{background:#f0f7f4}.freq-opt.sel{color:#2d6a4f;font-weight:700}.freq-opt+.freq-opt{border-top:1px solid #f0f0f0}
.bi-target{display:flex;align-items:center;gap:8px;padding:4px 14px 10px 50px;flex-wrap:wrap}
.bi-chk{width:22px;height:22px;border-radius:6px;border:2px solid #80cfa0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:white;transition:all .15s}
.bi-chk.on{background:#1a7a4a;border-color:#1a7a4a}.bi-chk.locked{background:#e0e0e0;border-color:#ccc;cursor:default}
.bi-label{font-size:12px;color:#555;font-weight:500}.bi-label.lk{color:#bbb}
.mens-target{display:flex;align-items:center;gap:8px;padding:4px 14px 10px 50px}
.mens-chk{width:22px;height:22px;border-radius:6px;border:2px solid #b39ddb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:white;transition:all .15s}
.mens-chk.on{background:#5c35b5;border-color:#5c35b5}.mens-chk.locked{background:#e0e0e0;border-color:#ccc;cursor:default}
.manage-room{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
.manage-room-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#f0f7f4;cursor:pointer}
.manage-room-hdr .room-name{flex:1;font-weight:700;font-size:14px}
.manage-task-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid #f5f5f5}
.manage-task-name{flex:1;font-size:13px}
.del-btn{width:28px;height:28px;border-radius:50%;background:#fff0f0;border:1px solid #ffcccc;color:#cc3333;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.add-task-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #f0f0f0;background:#fafff9}
.add-task-row input{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.add-task-row button{background:#2d6a4f;color:white;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600}
.add-room-form{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:14px;margin-bottom:10px}
.add-room-form h3{font-size:14px;font-weight:700;margin-bottom:10px;color:#2d6a4f}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.form-row button{background:#2d6a4f;color:white;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-nav button{background:#edf7f1;color:#2d6a4f;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.month-label{flex:1;text-align:center;font-size:15px;font-weight:700}
.view-tabs{display:flex;gap:6px;margin-bottom:12px}
.vtab{flex:1;text-align:center;padding:7px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid #ddd;background:#fff;color:#666}
.vtab.on{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.recap-week{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.recap-week-hdr{display:flex;align-items:center;padding:10px 14px;background:#f0f7f4;gap:8px;cursor:pointer}
.recap-week-lbl{font-weight:700;font-size:13px;flex:1}
.recap-pct{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px}
.recap-reset{font-size:11px;padding:4px 10px;border-radius:8px;background:#fff;border:1px solid #2d6a4f;color:#2d6a4f;cursor:pointer;font-weight:600}
.recap-task-row{display:flex;align-items:center;padding:8px 14px;border-top:1px solid #f5f5f5;gap:10px}
.recap-task-name{flex:1;font-size:13px}
.missed-room{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:8px;overflow:hidden}
.missed-room-hdr{padding:10px 14px;background:#fff5f5;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.missed-task{padding:8px 14px;border-top:1px solid #f5f5f5;font-size:13px;display:flex;gap:8px;align-items:center}
.missed-week-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#ffe0e0;color:#cc3333;font-weight:600;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-head{text-align:center;font-size:10px;font-weight:700;color:#666;padding:4px 0}
.cal-day{border-radius:8px;padding:4px 2px;text-align:center;min-height:40px}
.cal-day .day-num{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-day.empty{opacity:0}.cal-day.ok{background:#e8f5e9}.cal-day.miss{background:#fff0f0}.cal-day.partial{background:#fff8e1}.cal-day.future{background:#f5f5f5;color:#bbb}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto}
.empty-state{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.loading{text-align:center;padding:2rem;color:#888;font-size:14px}
.refresh-btn{background:#edf7f1;border:1px solid #2d6a4f;color:#2d6a4f;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
</style>

<body>
<div class="topbar">
  <span class="topbar-icon">🧹</span>
  <div style="flex:1"><div class="topbar-title">Planning Ménage</div><div class="topbar-sub" id="topweek"></div></div>
  <button class="refresh-btn" onclick="APP.refresh()" style="margin-right:8px">↺ Sync</button>
  <div class="sync-dot" id="syncdot"></div>
</div>
<div class="app">
  <div class="screen on" id="screen-planning">
    <div class="card">
      <div class="week-nav">
        <button onclick="APP.cw(-1)">◀</button>
        <span class="week-label" id="wl"></span>
        <button onclick="APP.cw(1)">▶</button>
        <button class="today" onclick="APP.cw(0,1)">Auj.</button>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <div class="prog-txt" id="pt">–</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#90c4ef"></div>Hebdo</div>
        <div class="li"><div class="ld" style="background:#80cfa0"></div>Bi-mensuel</div>
        <div class="li"><div class="ld" style="background:#b39ddb"></div>Mensuel</div>
        <div class="li"><div class="ld" style="background:#e0e0e0"></div>Fait · 🔄 refaire</div>
      </div>
    </div>
    <div class="filters" id="room-filters"></div>
    <div id="rooms"></div>
  </div>
  <div class="screen" id="screen-bilan">
    <div class="card">
      <div class="month-nav"><button onclick="APP.cm(-1)">◀</button><span class="month-label" id="mlabel"></span><button onclick="APP.cm(1)">▶</button></div>
      <div class="view-tabs">
        <button class="vtab on" id="vt-recap" onclick="APP.setView('recap')">📋 Récap</button>
        <button class="vtab" id="vt-missed" onclick="APP.setView('missed')">❌ Non faites</button>
        <button class="vtab" id="vt-cal" onclick="APP.setView('cal')">📅 Calendrier</button>
      </div>
    </div>
    <div id="bilan-content"></div>
  </div>
  <div class="screen" id="screen-manage">
    <div class="add-room-form">
      <h3>➕ Ajouter une tâche</h3>
      <div class="form-row">
        <input id="new-task-name" placeholder="Nom de la tâche"/>
        <select id="new-task-room"><option value="">Pièce...</option></select>
      </div>
      <div class="form-row">
        <select id="new-task-freq">
          <option value="hebdo">Hebdomadaire</option>
          <option value="bimens">Bi-mensuel</option>
          <option value="mensuel">Mensuel</option>
        </select>
        <button onclick="APP.addTask()">Ajouter</button>
      </div>
    </div>
    <div id="manage-rooms"></div>
  </div>
</div>
<div class="tabbar">
  <button class="tab on" id="tab-planning" onclick="APP.showScreen('planning')"><span class="tab-ico">📋</span>Planning</button>
  <button class="tab" id="tab-bilan" onclick="APP.showScreen('bilan')"><span class="tab-ico">📊</span>Bilan</button>
  <button class="tab" id="tab-manage" onclick="APP.showScreen('manage')"><span class="tab-ico">⚙️</span>Gérer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase — getDoc/setDoc only, NO onSnapshot (breaks Safari) ──
const fbApp = initializeApp({
  apiKey:"AIzaSyDvQoS-_I0LSDYkW_dVIt8Hqmfqj-_SvGU",
  authDomain:"planning-menage-c832d.firebaseapp.com",
  projectId:"planning-menage-c832d",
  storageBucket:"planning-menage-c832d.firebasestorage.app",
  messagingSenderId:"1089776086126",
  appId:"1:1089776086126:web:7318486e939eea4dbf8a7f"
});
const db = getFirestore(fbApp);
const docRef = doc(db,'planning','shared');

// ── Constants ─────────────────────────────────────────────────────
const DEFAULT_ROOMS=['SdB','WC','Douche','Jules','Desk','Couloir','Chambre','Salon','Cuisine'];
const ICONS={SdB:'🚿',WC:'🚽',Douche:'🛁',Jules:'🛏',Desk:'💻',Couloir:'🚪',Chambre:'🛌',Salon:'🛋',Cuisine:'🍳'};
const FREQS=['hebdo','bimens','mensuel'];
const FLABELS={hebdo:'Hebdo',bimens:'Bi-mensuel',mensuel:'Mensuel'};
const FCLASS={hebdo:'fhebdo',bimens:'fbimens',mensuel:'fmensuel'};
const LOCKDAYS={hebdo:7,bimens:14,mensuel:30};
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR=['L','M','M','J','V','S','D'];
const DEFAULT_TASKS=[
  {id:'glace',   name:'Glace',            rooms:['SdB','Douche','Couloir'],freq:'hebdo'},
  {id:'aeration',name:'Aération',         rooms:['SdB','WC','Douche','Cuisine'],freq:'hebdo'},
  {id:'draps',   name:'Draps',            rooms:['Jules','Chambre'],freq:'hebdo'},
  {id:'meuble',  name:'Meuble',           rooms:['Salon','Cuisine'],freq:'hebdo'},
  {id:'nuit',    name:'Table de nuit',    rooms:['Chambre'],freq:'hebdo'},
  {id:'canape',  name:'Canapé',           rooms:['Desk'],freq:'hebdo'},
  {id:'tv',      name:'TV',               rooms:['Salon'],freq:'hebdo'},
  {id:'pouss',   name:'Poussière',        rooms:['Salon','Chambre','Jules','Desk'],freq:'hebdo'},
  {id:'wcnet',   name:'Nettoyage WC',     rooms:['WC'],freq:'hebdo'},
  {id:'douchet', name:'Nettoyage douche', rooms:['Douche'],freq:'hebdo'},
  {id:'sol',     name:'Sol',              rooms:['SdB','WC','Douche','Jules','Couloir','Chambre','Salon','Cuisine'],freq:'mensuel'},
  {id:'fenetre', name:'Fenêtre',          rooms:['Jules','Desk','Chambre','Salon','Cuisine'],freq:'mensuel'},
  {id:'mbhaut',  name:'Meuble haut',      rooms:['WC','Desk'],freq:'mensuel'},
  {id:'derlit',  name:'Derrière le lit',  rooms:['Jules','Chambre'],freq:'mensuel'},
  {id:'four',    name:'Four',             rooms:['Cuisine'],freq:'mensuel'},
  {id:'verr',    name:'Verrière',         rooms:['Salon'],freq:'mensuel'},
];

// ── State ─────────────────────────────────────────────────────────
let offset=0,roomFilter='all',openMenu=null;
let monthOffset=0,bilanView='recap',currentScreen='planning';
let checks={},freqOv={},customTasks=[],deletedIds=[],roomOrder=[...DEFAULT_ROOMS];
let dbLoaded=false;

// ── Firebase: simple get/set (no realtime) ────────────────────────
function dot(s){const d=document.getElementById('syncdot');d.className='sync-dot'+(s==='ok'?' ok':s==='sync'?' sync':s==='err'?' err':'');}

async function fbLoad(){
  dot('sync');
  try{
    const snap=await getDoc(docRef);
    if(snap.exists()){
      const d=snap.data();
      // Clean expired checks before applying
      const now=todayStr();
      const raw=d.checks||{};
      Object.keys(raw).forEach(k=>{
        const c=raw[k];if(!c||!c.done)return;
        const freq=k.startsWith('b|')?'bimens':k.startsWith('m|')?'mensuel':'hebdo';
        const unlock=addDays(c.at,LOCKDAYS[freq]);
        if(now>=unlock) delete raw[k];
      });
      checks=raw;
      freqOv=d.freq||{};
      customTasks=d.custom||[];
      deletedIds=d.deleted||[];
      roomOrder=d.rooms||[...DEFAULT_ROOMS];
    }
    dbLoaded=true;
    dot('ok');
    renderAll();
  }catch(e){
    dot('err');
    console.error('Load error:',e);
  }
}

async function fbSave(){
  dot('sync');
  try{
    await setDoc(docRef,{checks,freq:freqOv,custom:customTasks,deleted:deletedIds,rooms:roomOrder});
    dot('ok');
    renderAll();
  }catch(e){
    dot('err');
    console.error('Save error:',e);
  }
}

async function refresh(){
  await fbLoad();
}

// Auto-refresh every 30s for cross-device sync
setInterval(fbLoad, 30000);

// ── Keys ──────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const addDays=(s,n)=>{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmtDate=s=>new Date(s+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
const ckH=(wk,tid,r)=>`h|${wk}|${tid}|${r}`;
const ckB=(tid,r,s)=>`b|${tid}|${r}|${s}`;
const ckM=(tid,r)=>`m|${tid}|${r}`;

function wkKey(o){const n=new Date(),dw=n.getDay()||7,m=new Date(n);m.setDate(n.getDate()-dw+1+o*7);return m.toISOString().slice(0,10);}
function wkLabel(o){
  const k=wkKey(o),m=new Date(k),s=new Date(m);s.setDate(m.getDate()+6);
  const f=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  if(o===0)return`Cette semaine · ${f(m)} – ${f(s)}`;
  if(o===-1)return`Sem. dernière · ${f(m)} – ${f(s)}`;
  return`${f(m)} – ${f(s)}`;
}

function keyFor(tid,room,freq,slot){
  if(freq==='hebdo') return ckH(wkKey(offset),tid,room);
  if(freq==='bimens') return ckB(tid,room,slot);
  return ckM(tid,room);
}

// ── Lock — simple, no side effects ───────────────────────────────
function getLock(key,freq){
  const c=checks[key];
  if(!c||!c.done) return {done:false,locked:false};
  const unlock=addDays(c.at,LOCKDAYS[freq]);
  if(todayStr()<unlock) return {done:true,locked:true,unlockDate:unlock};
  return {done:false,locked:false}; // expired: treat as unchecked
}

// ── Task helpers ──────────────────────────────────────────────────
function getAllTasks(){
  return[...DEFAULT_TASKS.filter(t=>!deletedIds.includes(t.id)).map(t=>({...t,freq:freqOv[t.id]||t.freq})),
         ...customTasks.map(t=>({...t,freq:freqOv[t.id]||t.freq}))];
}
function getAllRooms(){return[...roomOrder,...new Set(customTasks.flatMap(t=>t.rooms).filter(r=>!roomOrder.includes(r)))];}
function getTasksForRoom(room){return getAllTasks().filter(t=>t.rooms.includes(room)&&!deletedIds.includes('del_room_'+t.id+'_'+room));}

// ── Actions ───────────────────────────────────────────────────────
function doCheck(tid,room,freq,slot){
  const key=keyFor(tid,room,freq,slot);
  if(checks[key]&&checks[key].done) delete checks[key];
  else checks[key]={done:true,at:todayStr()};
  fbSave();
}

function doRedo(tid,room,freq,slot){
  const key=keyFor(tid,room,freq,slot);
  checks[key]={done:true,at:todayStr()};
  fbSave();
}

function setFreq(tid,freq){freqOv[tid]=freq;closeMenu();fbSave();}

function addTask(){
  const name=document.getElementById('new-task-name').value.trim();
  const room=document.getElementById('new-task-room').value;
  const freq=document.getElementById('new-task-freq').value;
  if(!name||!room){alert('Remplis le nom et la pièce !');return;}
  const ex=customTasks.find(t=>t.name.toLowerCase()===name.toLowerCase());
  if(ex){if(!ex.rooms.includes(room))ex.rooms.push(room);}
  else customTasks.push({id:'ct_'+Date.now(),name,rooms:[room],freq});
  document.getElementById('new-task-name').value='';
  fbSave();
}

function deleteTaskFromRoom(tid,room){
  const def=DEFAULT_TASKS.find(t=>t.id===tid);
  if(def){if(def.rooms.length===1){if(!deletedIds.includes(tid))deletedIds.push(tid);}
  else{const k='del_room_'+tid+'_'+room;if(!deletedIds.includes(k))deletedIds.push(k);}}
  const ci=customTasks.findIndex(t=>t.id===tid);
  if(ci>=0){customTasks[ci].rooms=customTasks[ci].rooms.filter(r=>r!==room);if(!customTasks[ci].rooms.length)customTasks.splice(ci,1);}
  fbSave();
}

function quickAdd(room){
  const inp=document.getElementById('it-'+room);const name=inp.value.trim();if(!name)return;
  const freq=document.getElementById('new-task-freq').value||'hebdo';
  const ex=customTasks.find(t=>t.name.toLowerCase()===name.toLowerCase());
  if(ex){if(!ex.rooms.includes(room))ex.rooms.push(room);}
  else customTasks.push({id:'ct_'+Date.now(),name,rooms:[room],freq});
  inp.value='';fbSave();
}

function markWeekDone(wk){
  const t=todayStr();
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(task=>{
    if(task.freq==='bimens'){['A','B'].forEach(s=>{const k=ckB(task.id,room,s);if(!checks[k]||!checks[k].done)checks[k]={done:true,at:t};});}
    else if(task.freq==='mensuel'){const k=ckM(task.id,room);if(!checks[k]||!checks[k].done)checks[k]={done:true,at:t};}
    else{const k=ckH(wk,task.id,room);if(!checks[k]||!checks[k].done)checks[k]={done:true,at:t};}
  }));
  fbSave();
}

function resetWeek(wk){
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(task=>{
    if(task.freq==='bimens'){['A','B'].forEach(s=>delete checks[ckB(task.id,room,s)]);}
    else if(task.freq==='mensuel'){delete checks[ckM(task.id,room)];}
    else{delete checks[ckH(wk,task.id,room)];}
  }));
  fbSave();
}

// ── Navigation ────────────────────────────────────────────────────
function cw(d,reset){offset=reset?0:offset+d;closeMenu();renderPlanning();}
function cm(d){monthOffset+=d;renderBilan();}
function setRoomFilter(r){
  roomFilter=r;
  document.querySelectorAll('#room-filters .fb').forEach(b=>b.classList.toggle('on',b.dataset.room===r));
  renderPlanning();
}
function showScreen(s){
  currentScreen=s;
  ['planning','manage','bilan'].forEach(id=>{
    document.getElementById('screen-'+id).classList.toggle('on',id===s);
    document.getElementById('tab-'+id).classList.toggle('on',id===s);
  });
  if(s==='manage')renderManage();else if(s==='bilan')renderBilan();else renderPlanning();
}
function setView(v){
  bilanView=v;
  ['recap','missed','cal'].forEach(id=>document.getElementById('vt-'+id).classList.toggle('on',id===v));
  renderBilan();
}
function closeMenu(){if(openMenu){openMenu.classList.add('hide');openMenu=null;}}
function toggleFreqMenu(tid,room,el){
  const menu=document.getElementById('fm-'+tid+'-'+room);if(!menu)return;
  if(openMenu&&openMenu!==menu)openMenu.classList.add('hide');
  if(!menu.classList.contains('hide')){closeMenu();return;}
  const rect=el.getBoundingClientRect();
  menu.style.left=Math.max(8,rect.right-150)+'px';
  menu.style.top=(window.innerHeight-rect.bottom>140?rect.bottom+6:rect.top-136)+'px';
  menu.classList.remove('hide');openMenu=menu;
}
function tog(id){const el=document.getElementById(id);if(el)el.classList.toggle('hide');}

// ── Render helpers ────────────────────────────────────────────────
function fmenu(tid,room,freq){
  return`<div style="position:relative;display:inline-flex">
    <span class="ftag ${FCLASS[freq]}" onclick="APP.toggleFreqMenu('${tid}','${room}',this)">${FLABELS[freq]} ▾</span>
    <div class="freq-menu hide" id="fm-${tid}-${room}">
      ${FREQS.map(f=>`<div class="freq-opt${freq===f?' sel':''}" onclick="APP.setFreq('${tid}','${f}')">${FLABELS[f]}</div>`).join('')}
    </div>
  </div>`;
}
function renderFilters(){
  let h=`<button class="fb${roomFilter==='all'?' on':''}" data-room="all" onclick="APP.setRoomFilter('all')">Toutes</button>
    <button class="fb${roomFilter==='todo'?' on':''}" data-room="todo" onclick="APP.setRoomFilter('todo')">À faire</button>`;
  getAllRooms().forEach(r=>{h+=`<button class="fb${roomFilter===r?' on':''}" data-room="${r}" onclick="APP.setRoomFilter('${r}')">${r}</button>`;});
  document.getElementById('room-filters').innerHTML=h;
}

// ── Render Planning ───────────────────────────────────────────────
function renderPlanning(){
  if(!dbLoaded){document.getElementById('rooms').innerHTML='<div class="loading">⏳ Chargement…</div>';return;}
  document.getElementById('wl').textContent=wkLabel(offset);
  document.getElementById('topweek').textContent=wkLabel(offset);
  renderFilters();
  let tot=0,done=0;
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(t=>{
    const slots=t.freq==='bimens'?['A','B']:[null];
    slots.forEach(s=>{const li=getLock(keyFor(t.id,room,t.freq,s),t.freq);if(!li.locked){tot++;if(li.done)done++;}});
  }));
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${done} / ${tot} tâches disponibles · ${pct}%`;

  let roomsToShow=getAllRooms();
  if(roomFilter!=='all'&&roomFilter!=='todo') roomsToShow=[roomFilter];

  let html='';
  roomsToShow.forEach(room=>{
    let tasks=getTasksForRoom(room);
    if(roomFilter==='todo'){
      tasks=tasks.filter(t=>{
        const slots=t.freq==='bimens'?['A','B']:[null];
        return slots.some(s=>!getLock(keyFor(t.id,room,t.freq,s),t.freq).done);
      });
    }
    if(!tasks.length)return;
    let rd=0,rt=0;
    getTasksForRoom(room).forEach(t=>{
      const slots=t.freq==='bimens'?['A','B']:[null];
      slots.forEach(s=>{const li=getLock(keyFor(t.id,room,t.freq,s),t.freq);rt++;if(li.done&&li.locked)rd++;});
    });
    const full=rt>0&&rd===rt;
    html+=`<div class="room-block">
      <div class="room-hdr" onclick="APP.tog('rb-${room}')">
        <span class="room-ico">${ICONS[room]||'🏠'}</span>
        <span class="room-name">${room}</span>
        <span class="room-badge${full?' full':''}">${rd}/${rt}</span>
      </div><div id="rb-${room}">`;

    tasks.forEach(t=>{
      const freq=t.freq;
      if(freq==='hebdo'){
        const key=keyFor(t.id,room,freq,null);
        const li=getLock(key,freq);
        const on=li.done&&li.locked;
        html+=`<div class="task-row${li.locked?' locked-row':''}">
          <div class="chk${on?' on':''}${li.locked?' locked':''}" ${!li.locked?`onclick="APP.doCheck('${t.id}','${room}','${freq}',null)"`:''}>
            ${on?'✓':''}
          </div>
          <span class="task-name${on?' struck':''}${li.locked?' lkn':''}">${t.name}</span>
          ${li.locked?`<button class="redo-btn" onclick="event.stopPropagation();APP.doRedo('${t.id}','${room}','${freq}',null)">🔄</button>`:''}
          ${fmenu(t.id,room,freq)}
        </div>`;
        if(li.locked) html+=`<div class="locked-info"><span class="locked-date">Fait · dispo le ${fmtDate(li.unlockDate)}</span></div>`;

      }else if(freq==='bimens'){
        html+=`<div class="task-row"><div style="width:26px;flex-shrink:0"></div><span class="task-name">${t.name}</span>${fmenu(t.id,room,freq)}</div>`;
        ['A','B'].forEach((slot,i)=>{
          const li=getLock(keyFor(t.id,room,freq,slot),freq);
          const on=li.done&&li.locked;
          html+=`<div class="bi-target">
            <div class="bi-chk${on?' on':''}${li.locked?' locked':''}" ${!li.locked?`onclick="APP.doCheck('${t.id}','${room}','${freq}','${slot}')"`:''}>
              ${on?'✓':''}
            </div>
            <span class="bi-label${li.locked?' lk':''}">${i===0?'1ère quinzaine':'2e quinzaine'}</span>
            ${li.locked?`<button class="redo-btn" onclick="event.stopPropagation();APP.doRedo('${t.id}','${room}','${freq}','${slot}')">🔄</button>
              <span class="locked-date">dispo le ${fmtDate(li.unlockDate)}</span>`:''}
          </div>`;
        });

      }else{
        const key=keyFor(t.id,room,freq,null);
        const li=getLock(key,freq);
        const on=li.done&&li.locked;
        html+=`<div class="task-row${li.locked?' locked-row':''}">
          <div style="width:26px;flex-shrink:0"></div>
          <span class="task-name${li.locked?' lkn':''}">${t.name}</span>
          ${li.locked?`<button class="redo-btn" onclick="event.stopPropagation();APP.doRedo('${t.id}','${room}','${freq}',null)">🔄</button>`:''}
          ${fmenu(t.id,room,freq)}
        </div>
        <div class="mens-target">
          <div class="mens-chk${on?' on':''}${li.locked?' locked':''}" ${!li.locked?`onclick="APP.doCheck('${t.id}','${room}','${freq}',null)"`:''}>
            ${on?'✓':''}
          </div>
          <span class="bi-label${li.locked?' lk':''}">
            ${li.locked?`Fait · dispo le ${fmtDate(li.unlockDate)}`:li.done?'Fait ✓':'À faire ce mois'}
          </span>
        </div>`;
      }
    });
    html+='</div></div>';
  });
  document.getElementById('rooms').innerHTML=html||'<div class="empty-state">Aucune tâche.</div>';
}

// ── Render Manage ─────────────────────────────────────────────────
function renderManage(){
  const sel=document.getElementById('new-task-room');
  sel.innerHTML='<option value="">Pièce...</option>';
  getAllRooms().forEach(r=>sel.innerHTML+=`<option value="${r}">${r}</option>`);
  sel.innerHTML+='<option value="__new">+ Nouvelle pièce...</option>';
  let html='';
  getAllRooms().forEach(room=>{
    const tasks=getTasksForRoom(room);if(!tasks.length)return;
    html+=`<div class="manage-room"><div class="manage-room-hdr" onclick="APP.tog('mr-${room}')">
      <span>${ICONS[room]||'🏠'}</span><span class="room-name">${room}</span>
      <span style="font-size:12px;color:#888">${tasks.length} tâche${tasks.length>1?'s':''}</span>
    </div><div id="mr-${room}">`;
    tasks.forEach(t=>html+=`<div class="manage-task-row">
      <span class="manage-task-name">${t.name}</span>
      <span class="ftag ${FCLASS[t.freq]}" style="cursor:default">${FLABELS[t.freq]}</span>
      <button class="del-btn" onclick="APP.deleteTaskFromRoom('${t.id}','${room}')">×</button>
    </div>`);
    html+=`<div class="add-task-row">
      <input placeholder="Nouvelle tâche..." id="it-${room}" onkeydown="if(event.key==='Enter')APP.quickAdd('${room}')">
      <button onclick="APP.quickAdd('${room}')">＋</button>
    </div></div></div>`;
  });
  document.getElementById('manage-rooms').innerHTML=html||'<div class="empty-state">Aucune pièce.</div>';
}

// ── Render Bilan ──────────────────────────────────────────────────
function getMonthWeeks(mo){
  const now=new Date(),tgt=new Date(now.getFullYear(),now.getMonth()+mo,1);
  const ty=tgt.getFullYear(),tm=tgt.getMonth();
  const first=new Date(ty,tm,1),last=new Date(ty,tm+1,0);
  let mon=new Date(first);const dw=mon.getDay()||7;mon.setDate(mon.getDate()-dw+1);
  const weeks=[];
  while(mon<=last){
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const f=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    weeks.push({key:mon.toISOString().slice(0,10),label:`${f(mon)} – ${f(sun)}`,mon:new Date(mon),sun:new Date(sun)});
    mon.setDate(mon.getDate()+7);
  }
  return{weeks,ty,tm};
}
function renderBilan(){
  if(!dbLoaded){document.getElementById('bilan-content').innerHTML='<div class="loading">⏳ Chargement…</div>';return;}
  const tgt=new Date(new Date().getFullYear(),new Date().getMonth()+monthOffset,1);
  document.getElementById('mlabel').textContent=`${MONTHS_FR[tgt.getMonth()]} ${tgt.getFullYear()}`;
  const{weeks,ty,tm}=getMonthWeeks(monthOffset);
  if(bilanView==='recap')renderRecap(weeks);
  else if(bilanView==='missed')renderMissed(weeks);
  else renderCal(weeks,ty,tm);
}
const chkB=(tid,r)=>['A','B'].every(s=>{const c=checks[ckB(tid,r,s)];return c&&c.done;});
const chkM=(tid,r)=>{const c=checks[ckM(tid,r)];return!!(c&&c.done);};
const chkH=(wk,tid,r)=>{const c=checks[ckH(wk,tid,r)];return!!(c&&c.done);};
function isDone(wk,t,room){
  if(t.freq==='bimens') return chkB(t.id,room);
  if(t.freq==='mensuel') return chkM(t.id,room);
  return chkH(wk,t.id,room);
}
function renderRecap(weeks){
  const nowD=new Date();let html='';
  [...weeks].reverse().forEach(w=>{
    const isFuture=w.mon>nowD;let wDone=0,wTot=0;const rows=[];
    getAllRooms().forEach(room=>getTasksForRoom(room).forEach(t=>{
      if(t.freq==='bimens'){
        ['A','B'].forEach(s=>{wTot++;const c=checks[ckB(t.id,room,s)];if(c&&c.done)wDone++;});
        rows.push({name:`${t.name} · ${room} (1ère)`,done:!!(checks[ckB(t.id,room,'A')]?.done)});
        rows.push({name:`${t.name} · ${room} (2e)`,done:!!(checks[ckB(t.id,room,'B')]?.done)});
      }else{wTot++;const d=isDone(w.key,t,room);if(d)wDone++;rows.push({name:`${t.name} · ${room}`,done:d});}
    }));
    const pct=wTot?Math.round(wDone/wTot*100):0;
    const col=pct>=80?'#2d6a4f':pct>=40?'#e6a817':'#cc3333';
    html+=`<div class="recap-week"><div class="recap-week-hdr" onclick="APP.tog('rw-${w.key}')">
      <span class="recap-week-lbl">${w.label}</span>
      ${!isFuture?`<span class="recap-pct" style="background:${col}22;color:${col}">${pct}%</span>
        <button class="recap-reset" onclick="event.stopPropagation();APP.markWeekDone('${w.key}')">✅ Tout fait</button>
        <button class="recap-reset" style="color:#cc3333;border-color:#cc3333" onclick="event.stopPropagation();APP.resetWeek('${w.key}')">↺</button>`
      :'<span style="font-size:12px;color:#aaa">À venir</span>'}
    </div>`;
    if(!isFuture){
      html+=`<div id="rw-${w.key}" class="hide">`;
      rows.forEach(r=>html+=`<div class="recap-task-row"><span style="font-size:16px;flex-shrink:0">${r.done?'✅':'❌'}</span><span class="recap-task-name">${r.name}</span></div>`);
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('bilan-content').innerHTML=html||'<div class="empty-state">Aucune donnée.</div>';
}
function renderMissed(weeks){
  const nowD=new Date();const mb={};
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(t=>{
    weeks.forEach(w=>{
      if(w.sun>=nowD)return;
      if(!isDone(w.key,t,room)){if(!mb[room])mb[room]=[];mb[room].push({task:t.name,week:w.label});}
    });
  }));
  let html='';
  Object.keys(mb).forEach(room=>{
    const items=mb[room];if(!items.length)return;
    html+=`<div class="missed-room"><div class="missed-room-hdr">${ICONS[room]||'🏠'} ${room} <span style="color:#cc3333;font-size:12px">(${items.length} manquée${items.length>1?'s':''})</span></div>`;
    items.forEach(m=>html+=`<div class="missed-task"><span style="flex:1">${m.task}</span><span class="missed-week-tag">${m.week}</span></div>`);
    html+='</div>';
  });
  document.getElementById('bilan-content').innerHTML=html||'<div class="empty-state">🎉 Aucune tâche manquée ce mois !</div>';
}
function renderCal(weeks,ty,tm){
  const nowD=new Date();const ds={};
  getAllRooms().forEach(room=>getTasksForRoom(room).forEach(t=>{
    weeks.forEach(w=>{
      if(!ds[w.key])ds[w.key]={done:0,tot:0};
      if(t.freq==='bimens'){ds[w.key].tot+=2;ds[w.key].done+=['A','B'].filter(s=>{const c=checks[ckB(t.id,room,s)];return c&&c.done;}).length;}
      else{ds[w.key].tot++;if(isDone(w.key,t,room))ds[w.key].done++;}
    });
  }));
  const first=new Date(ty,tm,1),dim=new Date(ty,tm+1,0).getDate(),sdow=(first.getDay()||7)-1;
  let html='<div class="card"><div class="cal-grid">';
  DAYS_FR.forEach(d=>html+=`<div class="cal-head">${d}</div>`);
  for(let i=0;i<sdow;i++)html+='<div class="cal-day empty"></div>';
  for(let day=1;day<=dim;day++){
    const date=new Date(ty,tm,day),dw=date.getDay()||7,mon=new Date(date);mon.setDate(date.getDate()-dw+1);
    const wk=mon.toISOString().slice(0,10),s=ds[wk]||{done:0,tot:0},isFuture=date>nowD;
    const pct=s.tot?s.done/s.tot:0;
    const cls=isFuture||s.tot===0?'future':pct>=1?'ok':pct>0?'partial':'miss';
    html+=`<div class="cal-day ${cls}"><div class="day-num">${day}</div>${!isFuture&&s.tot>0?`<div class="cal-dot" style="background:${pct>=1?'#2d6a4f':pct>0?'#e6a817':'#cc3333'}"></div>`:''}</div>`;
  }
  html+=`</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
    <div class="li"><div class="ld" style="background:#2d6a4f"></div><span style="font-size:11px">Toutes faites</span></div>
    <div class="li"><div class="ld" style="background:#e6a817"></div><span style="font-size:11px">Partielles</span></div>
    <div class="li"><div class="ld" style="background:#cc3333"></div><span style="font-size:11px">Non faites</span></div>
  </div></div>`;
  document.getElementById('bilan-content').innerHTML=html;
}
function renderAll(){
  if(currentScreen==='planning')renderPlanning();
  else if(currentScreen==='bilan')renderBilan();
  else renderManage();
}

document.addEventListener('change',e=>{
  if(e.target.id==='new-task-room'&&e.target.value==='__new'){
    const name=prompt('Nom de la nouvelle pièce :');
    if(name&&name.trim()){
      const r=name.trim();if(!roomOrder.includes(r))roomOrder.push(r);
      fbSave();renderManage();
      e.target.innerHTML='<option value="">Pièce...</option>';
      getAllRooms().forEach(rr=>e.target.innerHTML+=`<option value="${rr}">${rr}</option>`);
      e.target.innerHTML+='<option value="__new">+ Nouvelle pièce...</option>';
      e.target.value=r;
    }else e.target.value='';
  }
});
document.addEventListener('click',e=>{if(openMenu&&!e.target.classList.contains('ftag'))closeMenu();});

// ── Expose via APP namespace ──────────────────────────────────────
window.APP={
  cw,cm,setRoomFilter,showScreen,setView,
  toggleFreqMenu,setFreq,tog,
  doCheck,doRedo,
  addTask,deleteTaskFromRoom,quickAdd,
  markWeekDone,resetWeek,refresh
};

// ── Load on start ─────────────────────────────────────────────────
fbLoad();
</script>
